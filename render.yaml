# Render Blueprint — PSU ESSM curriculum website (pure static site)
# https://render.com/docs/blueprint-spec
#
# Reviewed by dominion-lead (mesh infra owner) 2026-06-22:
#  - runtime: static is the current schema (env: static is deprecated). ✓
#  - All asset/internal paths are ABSOLUTE (/assets/..., /about/), so the
#    per-section no-trailing-slash rewrites are redundant — removed (Render
#    auto-serves /curriculum/index.html for both /curriculum and /curriculum/).
#  - Deploy under the GitHub-login Render account infrastructure@tinfoil.lol
#    (consolidation target; NOT the Google-login tanwa@tinfoil.lol).
#  - autoDeploy: false on production — deploy manually after content +
#    AUN-QA sign-off (matches the Lumicello precedent). PR previews stay ON.
#  - Custom domain: owner TBD. If a PSU subdomain, DNS lives on PSU's side
#    (hand them Render's CNAME target). If under a mesh zone, dominion-lead
#    adds the Cloudflare CNAME. Clarify owner before wiring DNS.
services:
  - type: web
    name: essm-curriculum
    runtime: static
    # No build step — hand-authored static HTML/CSS/assets. Render's static
    # runtime can reject a truly empty buildCommand, so use a no-op.
    buildCommand: "echo no-build"
    staticPublishPath: ./site   # dir whose ROOT holds the top-level index.html
    autoDeploy: false           # manual prod deploy after sign-off
    pullRequestPreviewsEnabled: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
